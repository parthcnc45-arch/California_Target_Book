<div class="row page-heading">
  <h1 class="left">Contacts</h1>

</div>

<div class="pt-md">
  <div class="row">

    <div class="col s3 l2 xl2">
      <div class="card-panel stats-panel clearfix">
        <div class="col s12 title teal lighten-1">
          <h4>Total</h4>
        </div>
        <div class="col s12 stat">
          <h4>{{stats.total}}</h4>
        </div>
      </div>
    </div>

    <div class="col s3 l2 xl2">
      <div class="card-panel  stats-panel clearfix">
        <div class="col s12 title green lighten-1">
          <h4>Active</h4>
        </div>
        <div class="col s12 stat">
          <h4>{{stats.active}}</h4>
        </div>
      </div>
    </div>

    <div class="col s3 l2 xl2">
      <div class="card-panel stats-panel clearfix">
        <div class="col s12 title red lighten-1 ">
          <h4>Inactive</h4>
        </div>
        <div class="col s12 stat">
          <h4>{{stats.inactive}}</h4>
        </div>
      </div>
    </div>

  </div>

  <div class="row">
    <div class="col s12">
      <button class="pull-right btn btn-primary" (click)="exportContacts()">Export</button>
    </div>
  </div>

  <div class="row">
    <div class="col s12">
      <mat-card class="p-n">
        <mat-card-header class="p-sm">

          <div class="input-field col s12">
            <i class="material-icons prefix">search</i>

            <label for="query">Search</label>
            <input id="query"
              class="mb-n"
              (keyup)="applyFilter($event.target.value)"
              type="text" />
          </div>

        </mat-card-header>

        <mat-card-content>
          <mat-table #table [dataSource]="usersData" matSort>
            <ng-container matColumnDef="status">
              <mat-header-cell *matHeaderCellDef mat-sort-header class="statusCell">Status</mat-header-cell>
              <mat-cell *matCellDef="let user" class="statusCell">
                <span class="circle"
                  [ngClass]="{'green': user.hasActiveSubscription, 'red': !user.hasActiveSubscription}">
                </span>
              </mat-cell>
            </ng-container>

            <ng-container matColumnDef="name">
              <mat-header-cell *matHeaderCellDef mat-sort-header> Name </mat-header-cell>
              <mat-cell *matCellDef="let user"> {{user.name}} </mat-cell>
            </ng-container>

            <ng-container matColumnDef="email">
              <mat-header-cell *matHeaderCellDef mat-sort-header> Email </mat-header-cell>
              <mat-cell *matCellDef="let user">
                <a [href]="'mailto:' + user.email">{{user.email}}</a>
              </mat-cell>
            </ng-container>

            <ng-container matColumnDef="company">
              <mat-header-cell *matHeaderCellDef mat-sort-header> Company </mat-header-cell>
              <mat-cell *matCellDef="let user"> {{user.company}} </mat-cell>
            </ng-container>

            <ng-container matColumnDef="subscribedOn">
              <mat-header-cell *matHeaderCellDef mat-sort-header> Subscribed On </mat-header-cell>
              <mat-cell *matCellDef="let user"> {{user.subscribedOn}} </mat-cell>
            </ng-container>

            <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
            <mat-row *matRowDef="let user; columns: columns"
                [id]="user?.id"
                (click)="viewUser(user.id)">>
            </mat-row>

          </mat-table>
        </mat-card-content>

        <div class="progress" [hidden]="!(isLoading$ | async)">
          <div class="indeterminate"></div>
        </div>

      </mat-card>

    </div>
  </div>
</div>
