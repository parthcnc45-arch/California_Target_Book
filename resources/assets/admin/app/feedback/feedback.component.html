<div class="admin-page-container">

  <div class="admin-page-header">
    <h1 class="admin-page-title">Feedback</h1>
  </div>

  <div class="admin-table-container">
    <mat-card class="admin-table-card">
      <mat-card-content style="padding: 16px 24px !important;">
        <table class="bordered responsive-table">
          
          <colgroup>
            <col span="1" style="width: 20%;">
            <col span="1" style="width: 60%;">
            <col span="1" style="width: 20%;">
          </colgroup>

          <thead>
            <tr>
              <th>Subscriber</th>
              <th>Feedback</th>
              <th>Reported On</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let f of (feedback$ | async)">
              <td>
                <a *ngIf="f.user_id"
                  [routerLink]="['/contacts', f.user_id]">
                  {{f.user?.first_name}} {{f.user?.last_name}}
                </a>
              </td>
              <td class="keep-whitespace">{{f.feedback}}</td>
              <td>{{f.created_at | date}}</td>
            </tr>
          </tbody>

        </table>
      </mat-card-content>

      <div class="progress" [hidden]="!(isLoading$ | async)">
        <div class="indeterminate"></div>
      </div>

    </mat-card>
  </div>

</div>
