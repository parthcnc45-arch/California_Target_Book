
<h2 mat-dialog-title>Update Organization</h2>

<form [formGroup]="companyForm" (submit)="onSubmit(companyForm)">

  <div mat-dialog-content>
    <div class="row">
      <div class="col s12">
        <mat-form-field>
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
      </div>

      <div class="col s12">
        <h6>Address</h6>
        <ctb-address-form [formGroup]="companyForm.get('address')"></ctb-address-form>
      </div>

    </div>
  </div>

  <div mat-dialog-actions>
    <button type="button" mat-button mat-dialog-close>Cancel</button>
    <button type="submit" [disabled]="isLoading" color="primary" mat-button>Save</button>
  </div>

  <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

</form>
