<div class="admin-page-container">

  <div class="admin-page-header">
    <h1 class="admin-page-title">Contacts</h1>
    <div class="admin-header-actions">
      <button class="btn waves-light brand z-depth-0" (click)="exportContacts()">Export</button>
    </div>
  </div>

  <div class="admin-stats-grid">
    <div class="admin-stat-card total-card">
      <div class="stat-label">Total</div>
      <div class="stat-value">{{stats.total}}</div>
    </div>

    <div class="admin-stat-card active-card">
      <div class="stat-label">Active</div>
      <div class="stat-value">{{stats.active}}</div>
    </div>

    <div class="admin-stat-card inactive-card">
      <div class="stat-label">Inactive</div>
      <div class="stat-value">{{stats.inactive}}</div>
    </div>
  </div>

  <div class="admin-table-container">
    <mat-card class="admin-table-card">
      <mat-card-header>
        <div class="admin-search-field">
          <i class="material-icons">search</i>
          <input type="text" placeholder="Search..." (keyup)="applyFilter($event.target.value)">
        </div>
      </mat-card-header>

      <mat-card-content>
        <mat-table #table [dataSource]="usersData" matSort>
          
          <ng-container matColumnDef="status">
            <mat-header-cell *matHeaderCellDef mat-sort-header class="statusCell">Status</mat-header-cell>
            <mat-cell *matCellDef="let user" class="statusCell">
              <span class="circle"
                [ngClass]="{'green': user.hasActiveSubscription, 'red': !user.hasActiveSubscription}">
              </span>
            </mat-cell>
          </ng-container>

          <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef mat-sort-header> Name </mat-header-cell>
            <mat-cell *matCellDef="let user"> {{user.name}} </mat-cell>
          </ng-container>

          <ng-container matColumnDef="email">
            <mat-header-cell *matHeaderCellDef mat-sort-header> Email </mat-header-cell>
            <mat-cell *matCellDef="let user">
              <a [href]="'mailto:' + user.email">{{user.email}}</a>
            </mat-cell>
          </ng-container>

          <ng-container matColumnDef="company">
            <mat-header-cell *matHeaderCellDef mat-sort-header> Company </mat-header-cell>
            <mat-cell *matCellDef="let user"> {{user.company}} </mat-cell>
          </ng-container>

          <ng-container matColumnDef="subscribedOn">
            <mat-header-cell *matHeaderCellDef mat-sort-header> Subscribed On </mat-header-cell>
            <mat-cell *matCellDef="let user"> {{user.subscribedOn}} </mat-cell>
          </ng-container>

          <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
          <mat-row *matRowDef="let user; columns: columns"
              [id]="user?.id"
              (click)="viewUser(user.id)">
          </mat-row>

        </mat-table>
      </mat-card-content>

      <div class="progress" [hidden]="!(isLoading$ | async)">
        <div class="indeterminate"></div>
      </div>

    </mat-card>
  </div>

</div>
