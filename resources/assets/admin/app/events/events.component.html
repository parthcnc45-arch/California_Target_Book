<div class="row page-heading">
  <h1>Events</h1>
</div>

<div class="pt-md">

  <div class="row">
    <div class="col s12">
      <div class="card-panel">
        <table class="bordered responsive-table">

          <thead>
          <tr>
            <th>Event</th>
            <th>Date & Time</th>
            <th>Cost</th>
            <th>Tickets Bought</th>
          </tr>
          </thead>

          <tbody>
          <tr *ngFor="let e of (events$ | async)"
              class="clickable-row"
            (click)="viewEvent(e.slug)">

            <td>{{ e.name }}</td>
            <td [innerHTML]="e.date"></td>
            <td>${{ e.ticketPrice | stripeCost }}</td>
            <td>{{ e.ticketsBought || 0 }}</td>

          </tr>
          </tbody>
        </table>

        <div class="progress" [hidden]="!(isLoading$ | async)">
          <div class="indeterminate"></div>
        </div>
      </div>
    </div>
  </div>
</div>
