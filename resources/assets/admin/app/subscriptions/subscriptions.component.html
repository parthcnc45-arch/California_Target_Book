<div class="admin-page-container">

  <div class="admin-page-header">
    <h1 class="admin-page-title">Subscriptions</h1>
    <a class="btn waves-light brand z-depth-0" routerLink="/contacts/new">
      Add
      <i class="material-icons right">add</i>
    </a>
  </div>

  <div class="admin-stats-grid">
    <div class="admin-stat-card total-card">
      <div class="stat-label">Total</div>
      <div class="stat-value">{{stats.total}}</div>
    </div>

    <div class="admin-stat-card active-card">
      <div class="stat-label">Active</div>
      <div class="stat-value">{{stats.active}}</div>
    </div>

    <div class="admin-stat-card inactive-card">
      <div class="stat-label">Inactive</div>
      <div class="stat-value">{{stats.inactive}}</div>
    </div>
  </div>

  <div class="admin-table-container">
    <mat-card class="admin-table-card">
      <mat-card-header>
        <div class="admin-search-field">
          <i class="material-icons">search</i>
          <input type="text" placeholder="Search..." (keyup)="applyFilter($event.target.value)">
        </div>
      </mat-card-header>

      <mat-card-content>
        <mat-table #table [dataSource]="subsData" matSort>
          
          <ng-container matColumnDef="status">
            <mat-header-cell *matHeaderCellDef mat-sort-header class="statusCell">Status</mat-header-cell>
            <mat-cell *matCellDef="let sub" class="statusCell">
              <span class="circle" [ngClass]="{'green': sub.isActive, 'red': !sub.isActive}"></span>
            </mat-cell>
          </ng-container>

          <ng-container matColumnDef="company">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Company</mat-header-cell>
            <mat-cell *matCellDef="let sub"> {{sub.company}} </mat-cell>
          </ng-container>

          <ng-container matColumnDef="contact">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Contact</mat-header-cell>
            <mat-cell *matCellDef="let sub">
              <a *ngIf="sub?.baseAccount?.id" [routerLink]="['/contacts', sub?.baseAccount?.id]">{{sub.baseAccount?.name}}</a>
            </mat-cell>
          </ng-container>

          <ng-container matColumnDef="endDate">
            <mat-header-cell *matHeaderCellDef mat-sort-header>Expiration</mat-header-cell>
            <mat-cell *matCellDef="let sub">{{ sub.cycle?.ends_on | date:"MMM Do, YYYY" }} </mat-cell>
          </ng-container>

          <mat-header-row *matHeaderRowDef="columns"></mat-header-row>
          <mat-row *matRowDef="let sub; columns: columns"
              [id]="sub?.id"
              (click)="viewSubscription(sub.id)">
          </mat-row>

        </mat-table>
      </mat-card-content>

      <div class="progress" *ngIf="isLoading">
        <div class="indeterminate"></div>
      </div>

    </mat-card>
  </div>

</div>
