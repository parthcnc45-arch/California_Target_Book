

<h1 mat-dialog-title>Update Account</h1>

<form [formGroup]="userForm" (submit)="onSubmit(userForm)">

  <div mat-dialog-content>
    <div class="row">
      <div class="col s6">
        <mat-form-field>
          <mat-label>First Name</mat-label>
          <input matInput formControlName="first_name" />
        </mat-form-field>
      </div>
      <div class="col s6">
        <mat-form-field>
          <mat-label>Last Name</mat-label>
          <input matInput formControlName="last_name" />
        </mat-form-field>
      </div>

      <div class="col s6">
        <mat-form-field>
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
        </mat-form-field>
      </div>

      <div class="col s6">
        <mat-form-field>
          <mat-label>Phone Number</mat-label>
          <input matInput formControlName="phone_number" />
        </mat-form-field>
      </div>

      <div class="col s12">
        <mat-form-field>
          <mat-label>Notes</mat-label>
          <textarea matInput matTextareaAutosize formControlName="notes"></textarea>
        </mat-form-field>
      </div>

    </div>
  </div>

  <div mat-dialog-actions>
    <button type="button" mat-button mat-dialog-close>Cancel</button>
    <button type="submit" [disabled]="isLoading" color="primary" mat-button>Save</button>
  </div>

  <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

</form>
