<div [formGroup]="addressForm">

  <div class="row">
    <div class="col s6">
      <mat-form-field>
        <mat-label>Address Line 1</mat-label>
        <input matInput type="text" formControlName="line1" />
      </mat-form-field>
    </div>
    <div class="col s6">
      <mat-form-field>
        <mat-label>Address Line 2</mat-label>
        <input matInput type="text" formControlName="line2" />
      </mat-form-field>
    </div>

    <div class="col s4">
      <mat-form-field>
        <mat-label>City</mat-label>
        <input matInput type="text" formControlName="city" />
      </mat-form-field>
    </div>

    <div class="col s4">
      <mat-form-field>
        <mat-label>State</mat-label>
        <mat-select formControlName="state">
            <mat-option *ngFor="let key of stateKeys" [value]="key">
              {{ states[key] }}
            </mat-option>
          </mat-select>
      </mat-form-field>
    </div>

    <div class="col s4">
      <mat-form-field>
        <mat-label>Zip Code</mat-label>
        <input matInput type="text" formControlName="zip_code" />
      </mat-form-field>
    </div>

    <div class="col s12">
      <mat-form-field>
        <mat-label>Special Instructions</mat-label>
        <textarea matInput formControlName="special_instructions"></textarea>
      </mat-form-field>
    </div>
  </div>

</div>
