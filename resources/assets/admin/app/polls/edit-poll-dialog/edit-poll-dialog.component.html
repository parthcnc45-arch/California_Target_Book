
<form [formGroup]="pollForm" (submit)="onSubmit(pollForm)" action="javascript:void(0)">

  <h2 *ngIf="pollIsNew" mat-dialog-title>Create Poll</h2>
  <h2 *ngIf="!pollIsNew" mat-dialog-title>Edit Poll</h2>

  <mat-dialog-content>

    <div class="row">
      <div class="col s12">
        <mat-form-field>
          <input autocomplete="off" matInput placeholder="Title" formControlName="title">
        </mat-form-field>
      </div>
      <div class="col s6">
        <mat-form-field>
          <input formControlName="startDate" matInput [matDatepicker]="startDatePicker" placeholder="Start Date">
          <mat-datepicker-toggle matSuffix [for]="startDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #startDatePicker></mat-datepicker>
        </mat-form-field>
      </div>
      <div class="col s6">
        <mat-form-field>
          <input formControlName="endDate" matInput [matDatepicker]="endDatePicker" placeholder="End Date">
          <mat-datepicker-toggle matSuffix [for]="endDatePicker"></mat-datepicker-toggle>
          <mat-datepicker #endDatePicker></mat-datepicker>
        </mat-form-field>
      </div>

    </div>
  </mat-dialog-content>

  <mat-dialog-actions>
    <button type="button" class="btn btn-default" mat-button mat-dialog-close>Cancel</button>

    <ctb-loader classes="small" *ngIf="isLoading"></ctb-loader>

    <button *ngIf="pollIsNew" type="submit" class="btn btn-primary" mat-button>Create</button>
    <button *ngIf="!pollIsNew"type="submit" class="btn btn-primary" mat-button>Save</button>

  </mat-dialog-actions>
</form>
